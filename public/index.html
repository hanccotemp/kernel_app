<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Núcleo AI-first · Cliente de demostración</title>
<style>
  :root { --bg:#0e0f14; --panel:#171922; --line:#262a36; --txt:#e7e9ef; --mut:#8a90a2; --acc:#6C4AB6; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .sub { color:var(--mut); font-size:12px; }
  .controls { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  select { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:13px; }
  main { max-width:760px; margin:0 auto; padding:20px; }
  #chat { display:flex; flex-direction:column; gap:12px; min-height:50vh; }
  .msg { padding:11px 14px; border-radius:12px; max-width:82%; font-size:14px; line-height:1.5; white-space:pre-wrap; }
  .user { align-self:flex-end; background:var(--acc); color:#fff; border-bottom-right-radius:4px; }
  .ia { align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .meta { align-self:flex-start; color:var(--mut); font-size:11px; font-family:ui-monospace,monospace; margin-top:-6px; }
  .composer { display:flex; gap:10px; margin-top:18px; position:sticky; bottom:0; padding:14px 0; background:linear-gradient(transparent,var(--bg) 30%); }
  input[type=text] { flex:1; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14px; }
  button { background:var(--acc); color:#fff; border:0; border-radius:10px; padding:12px 18px; font-size:14px; cursor:pointer; font-weight:600; }
  button:disabled { opacity:.5; cursor:wait; }
  label.voz { color:var(--mut); font-size:12px; display:flex; gap:5px; align-items:center; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Núcleo AI-first · cliente de demostración</h1>
    <div class="sub">El mismo motor sirve a todas las apps. Cambia la app y verás otro personaje, otro conocimiento.</div>
  </div>
  <div class="controls">
    <select id="app"></select>
    <select id="user"></select>
    <select id="lang">
      <option value="pt">PT</option><option value="es">ES</option><option value="en">EN</option>
    </select>
    <label class="voz"><input type="checkbox" id="voz" /> voz</label>
  </div>
</header>
<main>
  <div id="chat"></div>
  <div class="composer">
    <input type="text" id="input" placeholder="Escribe un mensaje..." autocomplete="off" />
    <button id="send">Enviar</button>
  </div>
</main>

<script>
const USERS = { sina: [["u_ana","Ana (premium+voz)"]], aurora: [["u_joao","João (free)"]] };
const chat = document.getElementById("chat");
const $ = (id) => document.getElementById(id);

async function loadApps() {
  const apps = await (await fetch("/api/apps")).json();
  $("app").innerHTML = apps.map(a => `<option value="${a.id}">${a.piel?.icono||""} ${a.nombre} — ${a.vertical}</option>`).join("");
  syncUsers();
}
function syncUsers() {
  const app = $("app").value;
  $("user").innerHTML = (USERS[app]||[]).map(([id,n]) => `<option value="${id}">${n}</option>`).join("");
}
$("app").addEventListener("change", () => { syncUsers(); });

function add(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text; chat.appendChild(d);
  chat.scrollIntoView({ block: "end" }); window.scrollTo(0, document.body.scrollHeight);
  return d;
}
function addMeta(text) {
  const d = document.createElement("div"); d.className = "meta"; d.textContent = text; chat.appendChild(d);
}

async function send() {
  const pregunta = $("input").value.trim();
  if (!pregunta) return;
  const appId = $("app").value, usuarioId = $("user").value, lang = $("lang").value, conVoz = $("voz").checked;
  add("user", pregunta); $("input").value = ""; $("send").disabled = true;
  try {
    const res = await fetch(`/api/apps/${appId}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-App-Id": appId, "X-User-Id": usuarioId },
      body: JSON.stringify({ pregunta, lang, conVoz }),
    });
    const r = await res.json();
    if (r.ok) {
      add("ia", r.texto);
      const k = r.meta.conocimiento;
      addMeta(`${r.meta.personaje} · ${r.meta.provider} · ${r.meta.lang} · ${r.meta.ms}ms · conocimiento: ${JSON.stringify(k)}${r.voz ? " · 🔊 voz lista" : ""}${r.meta.bloqueadoPorLimites ? " · ⚠ filtrado" : ""}`);
    } else {
      add("ia", r.texto || r.error);
    }
  } catch (e) {
    add("ia", "Error de red: " + e.message);
  } finally {
    $("send").disabled = false; $("input").focus();
  }
}
$("send").addEventListener("click", send);
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
loadApps();
</script>
</body>
</html>
